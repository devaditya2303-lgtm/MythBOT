<!DOCTYPE html>
<html>
<head>
<title>MythBOT</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
color:orange;
}

#chatbox{
width:350px;
height:400px;
border:2px solid orange;
margin:auto;
overflow-y:auto;
padding:10px;
background:#1c1c1c;
}

input{
width:250px;
padding:8px;
margin-top:10px;
}

button{
padding:8px;
background:orange;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<h1>MythBOT</h1>

<div id="chatbox">
<p><b>MythBOT:</b> Ask me anything about Krishna, Rama, Ramayana or Mahabharata.</p>
</div>

<input id="userInput" placeholder="Ask mythology question">
<button onclick="sendMessage()">Send</button>

<script>

function sendMessage(){

let input=document.getElementById("userInput").value.toLowerCase();
let chatbox=document.getElementById("chatbox");

chatbox.innerHTML += "<p><b>You:</b> "+input+"</p>";

let reply="MythBOT only answers questions about Krishna, Rama, Ramayana and Mahabharata.";

if(input.includes("krishna")){
reply="Krishna is the eighth avatar of Vishnu and a central figure in Mahabharata.";
}

else if(input.includes("rama")){
reply="Rama is the seventh avatar of Vishnu and the hero of Ramayana.";
}

else if(input.includes("ramayana")){
reply="Ramayana tells the story of Rama, Sita and the battle against Ravana.";
}

else if(input.includes("mahabharata")){
reply="Mahabharata is the epic describing the Kurukshetra war between Pandavas and Kauravas.";
}

else if(input.includes("gita")){
reply="Bhagavad Gita is the sacred dialogue between Krishna and Arjuna before the Kurukshetra war.";
}

chatbox.innerHTML += "<p><b>MythBOT:</b> "+reply+"</p>";

document.getElementById("userInput").value="";

}

</script>

</body>
</html>
